id: command-registry
version: "1.0"
description: Maps Symphony commands to workflows. Adapters consume this registry to generate platform-native commands.

categories:
  - id: lifecycle
    description: Full product lifecycle workflows
  - id: dev
    description: Developer tools and utilities
  - id: creative
    description: Creative and ideation workflows
  - id: testing
    description: Testing and quality assurance
  - id: utility
    description: Cross-cutting utilities
  - id: admin
    description: Framework administration

commands:
  - id: brainstorm
    command: symphony-brainstorm
    description: Multi-agent brainstorming roundtable
    workflow_ref: lifecycle/workflows/1-analysis/brainstorm
    category: lifecycle
  - id: market-research
    command: symphony-market-research
    description: Market research and competitive analysis
    workflow_ref: lifecycle/workflows/1-analysis/market-research
    category: lifecycle
  - id: domain-research
    command: symphony-domain-research
    description: Deep domain research
    workflow_ref: lifecycle/workflows/1-analysis/domain-research
    category: lifecycle
  - id: tech-research
    command: symphony-tech-research
    description: Technology stack research
    workflow_ref: lifecycle/workflows/1-analysis/tech-research
    category: lifecycle
  - id: product-brief
