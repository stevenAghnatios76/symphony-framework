id: security-testing
owner: test-architect
model: opus
description: Security vulnerability testing covering OWASP top 10 and dependency scanning

execution:
  mode: sequential
  wave_eligible: false
  max_wave_siblings: 0
  ensemble_participants: []
  ensemble_turn_policy: null
  max_turns: null

inputs:
  required: [architecture, codebase]
  optional: [test-plan]

outputs:
  primary: docs/testing-artifacts/security-test-report-<project>.md
  traceable_to: [architecture]

gates:
  pre_start:
    - Architecture doc exists
    - Codebase accessible
  post_complete:
    - Output has Vulnerability Inventory section
    - Output has Severity Classification section
    - Output has Dependency Audit section
    - Output has Remediation Plan section

disciplines:
  self_critique: true
  anti_rationalization: true
  trust_levels: true
