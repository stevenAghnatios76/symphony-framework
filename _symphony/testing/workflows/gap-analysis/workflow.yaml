id: gap-analysis
owner: test-architect
model: opus
description: Analyze test coverage gaps in existing codebase

execution:
  mode: sequential
  wave_eligible: false
  max_wave_siblings: 0
  ensemble_participants: []
  ensemble_turn_policy: null
  max_turns: null

inputs:
  required: [codebase]
  optional: [test-plan, coverage-report]

outputs:
  primary: docs/testing-artifacts/gap-analysis-{{project}}.md
  traceable_to: [test-plan]

gates:
  pre_start:
    - Source code accessible
  post_complete:
    - Output has Coverage Summary
    - Output has Gap Inventory with severity
    - Output has Prioritized Remediation Plan
    - Output has Effort Estimates

disciplines:
  self_critique: true
  anti_rationalization: true
  trust_levels: true
