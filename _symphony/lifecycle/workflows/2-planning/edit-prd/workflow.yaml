id: edit-prd
owner: product-manager
model: opus
description: Address validation feedback by editing the PRD

execution:
  mode: sequential
  wave_eligible: false
  max_wave_siblings: 0
  ensemble_participants: []
  ensemble_turn_policy: null
  max_turns: null

inputs:
  required: [prd, validation-feedback]
  optional: []

outputs:
  primary: docs/planning-artifacts/prd.md
  traceable_to: [prd]

gates:
  pre_start:
    - prd.md exists
  post_complete:
    - All validation issues addressed

disciplines:
  self_critique: true
  anti_rationalization: true
  trust_levels: true
