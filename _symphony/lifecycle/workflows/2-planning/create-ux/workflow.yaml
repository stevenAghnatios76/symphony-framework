id: create-ux
owner: ux-designer
model: opus
description: Design user experience flows, wireframes, and interaction patterns from PRD

execution:
  mode: sequential
  wave_eligible: false
  max_wave_siblings: 0
  ensemble_participants: []
  ensemble_turn_policy: null
  max_turns: null

inputs:
  required: [prd]
  optional: [product-brief]

outputs:
  primary: docs/planning-artifacts/ux-spec.md
  traceable_to: [prd]

gates:
  pre_start:
    - prd.md exists
  post_complete:
    - Output has User Flows section
    - Output has Wireframes section
    - Output has Interaction Patterns section
    - Output has Responsive Behavior section

disciplines:
  self_critique: true
  anti_rationalization: true
  trust_levels: true
