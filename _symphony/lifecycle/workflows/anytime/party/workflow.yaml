id: party
owner: product-manager
model: opus
description: Multi-agent roundtable on any topic — user picks who speaks next

execution:
  mode: ensemble
  wave_eligible: false
  max_wave_siblings: 0
  ensemble_participants: [product-manager, architect, developer, reviewer]
  ensemble_turn_policy: user-picks
  max_turns: 20

inputs:
  required: []
  optional: []

outputs:
  primary: docs/planning-artifacts/party-transcript.md
  traceable_to: []

gates:
  pre_start: []
  post_complete:
    - Transcript has at least 2 participant contributions
    - Synthesis section has decisions and action items

disciplines:
  self_critique: true
  anti_rationalization: true
  trust_levels: true
