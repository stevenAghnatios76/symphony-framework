id: document-project
owner: tech-writer
model: opus
description: Generate comprehensive project documentation from all available artifacts

execution:
  mode: sequential
  wave_eligible: false
  max_wave_siblings: 0
  ensemble_participants: []
  ensemble_turn_policy: null
  max_turns: null

inputs:
  required: []
  optional: [planning-artifacts, implementation-artifacts]

outputs:
  primary: docs/project-documentation.md
  traceable_to: []

gates:
  pre_start: []
  post_complete:
    - Documentation has Project Overview
    - Documentation has Architecture section
    - Documentation has API Reference
    - Documentation has Deployment Guide
    - Documentation has Configuration section

disciplines:
  self_critique: true
  anti_rationalization: true
  trust_levels: true
