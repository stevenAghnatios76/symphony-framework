id: tech-debt-review
owner: developer
model: opus
description: Scan the codebase for technical debt, classify severity, and recommend paydown order

execution:
  mode: sequential
  wave_eligible: false
  max_wave_siblings: 0
  ensemble_participants: []
  ensemble_turn_policy: null
  max_turns: null

inputs:
  required: []
  optional: [architecture, implementation]

outputs:
  primary: docs/implementation-artifacts/tech-debt-review.md
  traceable_to: []

gates:
  pre_start: []
  post_complete:
    - Report has Debt Items catalogued
    - Report has Severity classifications
    - Report has Impact assessments
    - Report has Recommended paydown Order
    - Report has Estimated Effort

disciplines:
  self_critique: true
  anti_rationalization: true
  trust_levels: true
