id: toggle
owner: conductor
model: opus
description: Toggle Symphony feature flags and configuration settings

execution:
  mode: sequential
  wave_eligible: false
  max_wave_siblings: 0
  ensemble_participants: []
  ensemble_turn_policy: null
  max_turns: null

inputs:
  required: [feature-name]
  optional: [value]

outputs:
  primary: null
  traceable_to: []

gates:
  pre_start:
    - global.yaml exists and is readable
  post_complete:
    - Feature state changed
    - Configuration validated
    - Change logged

disciplines:
  self_critique: true
  anti_rationalization: true
  trust_levels: true
