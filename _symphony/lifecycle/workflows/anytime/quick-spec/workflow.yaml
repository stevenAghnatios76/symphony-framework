id: quick-spec
owner: product-manager
model: opus
description: Lightweight spec for small features — gather scope and produce a quick-spec artifact

execution:
  mode: sequential
  wave_eligible: false
  max_wave_siblings: 0
  ensemble_participants: []
  ensemble_turn_policy: null
  max_turns: null

inputs:
  required: []
  optional: []

outputs:
  primary: docs/planning-artifacts/quick-spec.md
  traceable_to: []

gates:
  pre_start: []
  post_complete:
    - Quick-spec has Goal section
    - Quick-spec has Scope section
    - Quick-spec has Acceptance Criteria
    - Quick-spec has Estimated Effort

disciplines:
  self_critique: true
  anti_rationalization: true
  trust_levels: true
