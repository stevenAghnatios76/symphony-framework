id: validate-story
owner: validator
model: opus
description: Validate a user story for completeness, traceability, and testability

execution:
  mode: sequential
  wave_eligible: false
  max_wave_siblings: 0
  ensemble_participants: []
  ensemble_turn_policy: null
  max_turns: null

inputs:
  required: [story-file, epics]
  optional: []

outputs:
  primary: validation report (inline)
  traceable_to: [story-file]

gates:
  pre_start:
    - Story file exists
    - Parent epic exists
  post_complete:
    - Validation report produced
  on_pass: sprint-plan
  on_fail: create-story

disciplines:
  self_critique: true
  anti_rationalization: true
  trust_levels: true
