id: security-review
owner: security-agent
model: opus
description: Security review of story implementation — OWASP, dependencies, secrets

execution:
  mode: sequential
  wave_eligible: false
  max_wave_siblings: 0
  ensemble_participants: []
  ensemble_turn_policy: null
  max_turns: null

inputs:
  required: [story-implementation]
  optional: []

outputs:
  primary: docs/implementation-artifacts/reviews/{story-id}-security-review.md
  traceable_to: [story-implementation]

gates:
  pre_start:
    - Story implementation exists
  post_complete:
    - Security review report produced

disciplines:
  self_critique: true
  anti_rationalization: true
  trust_levels: true
