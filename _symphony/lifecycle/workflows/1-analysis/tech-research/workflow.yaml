id: tech-research
owner: research-analyst
model: opus
description: Evaluate technology options against requirements and recommend a stack

execution:
  mode: sequential
  wave_eligible: false
  max_wave_siblings: 0
  ensemble_participants: []
  ensemble_turn_policy: null
  max_turns: null

inputs:
  required: []
  optional: [product-brief, domain-research]

outputs:
  primary: docs/planning-artifacts/tech-research.md
  traceable_to: []

gates:
  pre_start: []
  post_complete:
    - Output has Technology Options section
    - Output has Evaluation Criteria section
    - Output has Recommendation section

disciplines:
  self_critique: true
  anti_rationalization: true
  trust_levels: true
