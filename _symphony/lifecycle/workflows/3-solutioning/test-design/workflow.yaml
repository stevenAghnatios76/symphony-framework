id: test-design
owner: test-architect
model: opus
description: Design test strategy, pyramid, coverage goals, and CI integration plan

execution:
  mode: sequential
  wave_eligible: false
  max_wave_siblings: 0
  ensemble_participants: []
  ensemble_turn_policy: null
  max_turns: null

inputs:
  required: [architecture]
  optional: [prd]

outputs:
  primary: docs/planning-artifacts/test-plan.md
  traceable_to: [architecture]

gates:
  pre_start:
    - architecture.md exists
  post_complete:
    - Output has Strategy section
    - Output has Test Pyramid section
    - Output has Coverage Goals section
    - Output has Framework Selection section
    - Output has CI Integration section

disciplines:
  self_critique: true
  anti_rationalization: true
  trust_levels: true
