id: threat-model
owner: security-agent
model: opus
description: Perform STRIDE threat analysis on architecture and propose mitigations

execution:
  mode: sequential
  wave_eligible: false
  max_wave_siblings: 0
  ensemble_participants: []
  ensemble_turn_policy: null
  max_turns: null

inputs:
  required: [architecture]
  optional: []

outputs:
  primary: docs/planning-artifacts/threat-model.md
  traceable_to: [architecture]

gates:
  pre_start:
    - architecture.md exists
  post_complete:
    - Output has Attack Surface section
    - Output has STRIDE Analysis section
    - Output has Mitigations section
    - Output has Residual Risks section

disciplines:
  self_critique: true
  anti_rationalization: true
  trust_levels: true
