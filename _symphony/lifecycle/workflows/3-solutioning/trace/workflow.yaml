id: trace
owner: test-architect
model: opus
description: Build requirement-to-epic-to-test traceability matrix and identify gaps

execution:
  mode: sequential
  wave_eligible: false
  max_wave_siblings: 0
  ensemble_participants: []
  ensemble_turn_policy: null
  max_turns: null

inputs:
  required: [prd, architecture, epics]
  optional: [acceptance-tests, threat-model]

outputs:
  primary: docs/planning-artifacts/traceability-matrix.md
  traceable_to: [prd, architecture, epics]

gates:
  pre_start:
    - prd.md exists
    - architecture.md exists
    - epics.md exists
  post_complete:
    - Every requirement traces from brief to PRD to architecture to epic to test
    - No untraceable requirements remain

disciplines:
  self_critique: true
  anti_rationalization: true
  trust_levels: true
