id: edit-arch
owner: architect
model: opus
description: Apply changes to the architecture document and update ADRs

execution:
  mode: sequential
  wave_eligible: false
  max_wave_siblings: 0
  ensemble_participants: []
  ensemble_turn_policy: null
  max_turns: null

inputs:
  required: [architecture, change-context]
  optional: []

outputs:
  primary: docs/planning-artifacts/architecture.md
  traceable_to: [architecture]

gates:
  pre_start:
    - architecture.md exists
  post_complete:
    - Changes are consistent with PRD
    - ADRs updated for any new decisions

disciplines:
  self_critique: true
  anti_rationalization: true
  trust_levels: true
