id: create-epics
owner: product-manager
model: opus
description: Decompose architecture into implementation epics with acceptance criteria and traceability

execution:
  mode: sequential
  wave_eligible: false
  max_wave_siblings: 0
  ensemble_participants: []
  ensemble_turn_policy: null
  max_turns: null

inputs:
  required: [architecture, prd]
  optional: []

outputs:
  primary: docs/planning-artifacts/epics.md
  traceable_to: [architecture, prd]

gates:
  pre_start:
    - architecture.md exists
  post_complete:
    - Each epic has title, description, acceptance criteria
    - Each epic traces to architecture component and PRD requirement

disciplines:
  self_critique: true
  anti_rationalization: true
  trust_levels: true
