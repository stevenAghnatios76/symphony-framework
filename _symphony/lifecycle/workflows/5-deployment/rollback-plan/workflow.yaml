id: rollback-plan
owner: devops-agent
model: opus
description: Define rollback triggers, steps, and verification for the release

execution:
  mode: sequential
  wave_eligible: false
  max_wave_siblings: 0
  ensemble_participants: []
  ensemble_turn_policy: null
  max_turns: null

inputs:
  required: [release-plan]
  optional: []

outputs:
  primary: docs/implementation-artifacts/rollback-plan.md
  traceable_to: [release-plan]

gates:
  pre_start:
    - Release plan exists
  post_complete:
    - Rollback plan document produced
    - Rollback triggers defined

disciplines:
  self_critique: true
  anti_rationalization: true
  trust_levels: true
